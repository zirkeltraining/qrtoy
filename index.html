<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QRTOY</title>
  <style>
    :root {
      --bg: #0e141b;
      --panel: #121b24;
      --text: #f4f7fb;
      --muted: #b7c0cb;
      --accent: #2dd4bf;
      --accent-2: #38bdf8;
      --warn: #fb7185;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(120% 120% at 20% 0%, #1c2732 0%, var(--bg) 55%, #0a1016 100%);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: 3fr 1fr;
      gap: 10px;
      padding: 10px;
      position: relative;
    }

    .title-line {
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(244, 247, 251, 0.38);
      pointer-events: none;
      z-index: 20;
    }

    .top {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b1118;
    }

    .overlay,
    .reload-cta {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 16px;
      backdrop-filter: blur(3px);
    }

    .overlay {
      background: rgba(12,18,25,0.65);
    }

    .overlay-card,
    .reload-card {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(17,25,35,0.86);
      padding: 18px 14px;
      max-width: 280px;
      width: 100%;
    }

    .icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .msg {
      color: var(--text);
      font-size: 1.06rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .camera {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      background: #020507;
      min-height: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center center;
      transition: transform 120ms linear;
    }

    .flash-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .controls {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .zoom-controls,
    .camera-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(17,25,35,0.8);
      color: var(--text);
      border-radius: 999px;
      min-width: 42px;
      height: 42px;
      font-size: 1rem;
      font-weight: 700;
      padding: 0 12px;
    }

    button:active { transform: scale(0.97); }

    .zoom-pill {
      min-width: 62px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--muted);
      background: rgba(17,25,35,0.84);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      height: 36px;
      display: grid;
      place-items: center;
      padding: 0 10px;
    }

    .reload-cta {
      display: none;
      background: rgba(9,14,20,0.5);
      align-items: end;
      padding-bottom: 18px;
    }

    .reload-cta.show { display: grid; }

    .reload-btn {
      width: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #051014;
      border: none;
      font-weight: 800;
      font-size: 1rem;
    }

    .error {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 5;
      color: #ffe4e6;
      font-size: 0.88rem;
      background: rgba(136, 19, 55, 0.7);
      border: 1px solid rgba(251,113,133,0.5);
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }

    canvas { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="title-line">QRTOY V0.1 BY MAX</div>
    <section class="top">
      <iframe id="viewer" title="QR target"></iframe>
      <div class="overlay" id="startOverlay">
        <div class="overlay-card">
          <span class="icon">📷</span>
          <div class="msg" id="startText">Start scanning</div>
        </div>
      </div>
      <div class="reload-cta" id="reloadCta">
        <div class="reload-card">
          <button class="reload-btn" id="reloadBtn">Tap here to reload</button>
        </div>
      </div>
    </section>

    <section class="camera">
      <div class="error" id="errorBox"></div>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="flashCanvas" class="flash-overlay"></canvas>
      <div class="controls">
        <div class="camera-controls">
          <button id="cameraBtn" aria-label="Select camera">🔄</button>
        </div>
        <div class="zoom-controls">
          <button id="zoomOut" aria-label="Zoom out">-</button>
          <div class="zoom-pill" id="zoomLabel">1.0x</div>
          <button id="zoomIn" aria-label="Zoom in">+</button>
        </div>
      </div>
    </section>
  </div>

  <canvas id="scanCanvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script>
    const els = {
      video: document.getElementById('video'),
      viewer: document.getElementById('viewer'),
      startOverlay: document.getElementById('startOverlay'),
      startText: document.getElementById('startText'),
      reloadCta: document.getElementById('reloadCta'),
      reloadBtn: document.getElementById('reloadBtn'),
      zoomIn: document.getElementById('zoomIn'),
      zoomOut: document.getElementById('zoomOut'),
      zoomLabel: document.getElementById('zoomLabel'),
      cameraBtn: document.getElementById('cameraBtn'),
      errorBox: document.getElementById('errorBox'),
      scanCanvas: document.getElementById('scanCanvas'),
      flashCanvas: document.getElementById('flashCanvas')
    };

    const state = {
      strings: {
        start_scanning: 'Start scanning',
        tap_reload: 'Tap here to reload',
        camera_label: 'Select camera',
        camera_error: 'Camera unavailable.',
        no_qr_support: 'QR scanning is not supported in this browser.'
      },
      stream: null,
      cameras: [],
      cameraIdx: 0,
      zoom: 1,
      zoomMin: 1,
      zoomMax: 3,
      zoomStep: 0.1,
      detector: null,
      detectorMode: null,
      scannedOnce: false,
      lastLoadedUrl: null,
      duplicateSeenAt: null,
      lastDetectedData: null,
      scanLoopId: null,
      decoding: false,
      feedbackUntil: 0,
      audioCtx: null,
      audioReady: false
    };

    function detectLanguage(supported) {
      const langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
      for (const lang of langs) {
        const base = String(lang).toLowerCase().split('-')[0];
        if (supported.includes(base)) return base;
      }
      return 'en';
    }

    async function loadI18n() {
      try {
        const resp = await fetch('./i18n.json', { cache: 'no-store' });
        const all = await resp.json();
        const lang = detectLanguage(Object.keys(all));
        state.strings = { ...state.strings, ...all[lang] };
      } catch (_) {
        // Keep defaults when local JSON cannot be read.
      }
      els.startText.textContent = state.strings.start_scanning;
      els.reloadBtn.textContent = state.strings.tap_reload;
      els.cameraBtn.setAttribute('aria-label', state.strings.camera_label);
    }

    function showError(message) {
      els.errorBox.textContent = message;
      els.errorBox.style.display = 'block';
    }

    function clearError() {
      els.errorBox.style.display = 'none';
    }

    function ensureFeedbackCanvasSize() {
      const rect = els.video.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const targetW = Math.max(1, Math.floor(rect.width * dpr));
      const targetH = Math.max(1, Math.floor(rect.height * dpr));
      if (els.flashCanvas.width !== targetW || els.flashCanvas.height !== targetH) {
        els.flashCanvas.width = targetW;
        els.flashCanvas.height = targetH;
      }
    }

    function unlockAudio() {
      if (!state.audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        state.audioCtx = new Ctx();
      }
      state.audioCtx.resume().then(() => {
        state.audioReady = true;
      }).catch(() => {});
    }

    function playShutterSound() {
      if (!state.audioCtx || !state.audioReady) return;
      const ctx = state.audioCtx;
      const now = ctx.currentTime;
      const gain = ctx.createGain();
      const osc = ctx.createOscillator();
      const noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.03), ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i += 1) noiseData[i] = (Math.random() * 2) - 1;
      const noise = ctx.createBufferSource();
      const noiseGain = ctx.createGain();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(220, now + 0.06);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);

      noise.buffer = noiseBuffer;
      noiseGain.gain.setValueAtTime(0.09, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.035);

      osc.connect(gain).connect(ctx.destination);
      noise.connect(noiseGain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.1);
      noise.start(now);
      noise.stop(now + 0.04);
    }

    function drawFeedbackPolygon(points) {
      if (!points || points.length < 4) return;
      ensureFeedbackCanvasSize();
      const ctx = els.flashCanvas.getContext('2d');
      const w = els.flashCanvas.width;
      const h = els.flashCanvas.height;
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const sx = w / dpr;
      const sy = h / dpr;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      for (let i = 0; i < points.length; i += 1) {
        const px = (points[i].x / els.video.videoWidth) * sx * dpr;
        const py = (points[i].y / els.video.videoHeight) * sy * dpr;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      state.feedbackUntil = performance.now() + 110;
      playShutterSound();
    }

    function renderFeedback() {
      if (performance.now() <= state.feedbackUntil) return;
      const ctx = els.flashCanvas.getContext('2d');
      ctx.clearRect(0, 0, els.flashCanvas.width, els.flashCanvas.height);
    }

    function setZoom(next) {
      state.zoom = Math.max(state.zoomMin, Math.min(state.zoomMax, Number(next.toFixed(2))));
      els.video.style.transform = `scale(${state.zoom})`;
      els.zoomLabel.textContent = `${state.zoom.toFixed(1)}x`;
    }

    function hideReloadCta() {
      els.reloadCta.classList.remove('show');
      state.duplicateSeenAt = null;
    }

    function isValidHttpUrl(raw) {
      try {
        const url = new URL(raw);
        return url.protocol === 'http:' || url.protocol === 'https:';
      } catch (_) {
        return false;
      }
    }

    async function listCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      state.cameras = devices.filter(d => d.kind === 'videoinput');
      state.cameraIdx = Math.min(state.cameraIdx, Math.max(0, state.cameras.length - 1));
    }

    async function stopStream() {
      if (state.stream) {
        state.stream.getTracks().forEach(t => t.stop());
        state.stream = null;
      }
    }

    async function startStream(deviceId) {
      await stopStream();
      const constraints = {
        audio: false,
        video: {
          facingMode: deviceId ? undefined : { ideal: 'environment' },
          deviceId: deviceId ? { exact: deviceId } : undefined,
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };
      state.stream = await navigator.mediaDevices.getUserMedia(constraints);
      els.video.srcObject = state.stream;
      await els.video.play();
      await listCameras();
      clearError();
    }

    async function switchCamera() {
      if (!state.cameras.length) return;
      state.cameraIdx = (state.cameraIdx + 1) % state.cameras.length;
      const nextId = state.cameras[state.cameraIdx].deviceId;
      try {
        await startStream(nextId);
      } catch (_) {
        showError(state.strings.camera_error);
      }
    }

    async function ensureDetector() {
      if ('BarcodeDetector' in window) {
        const supported = await window.BarcodeDetector.getSupportedFormats();
        if (supported.includes('qr_code')) {
          state.detector = new window.BarcodeDetector({ formats: ['qr_code'] });
          state.detectorMode = 'native';
          return;
        }
      }
      if (typeof window.jsQR === 'function') {
        state.detectorMode = 'jsqr';
        return;
      }
      throw new Error('no-qr');
    }

    function loadUrl(url, forceReload = false) {
      const nextUrl = forceReload ? `${url}${url.includes('?') ? '&' : '?'}_qrtoy_reload=${Date.now()}` : url;
      els.viewer.src = nextUrl;
      els.startOverlay.style.display = 'none';
      hideReloadCta();
      state.lastLoadedUrl = url;
      state.scannedOnce = true;
    }

    function handleQrText(raw) {
      if (!isValidHttpUrl(raw)) return false;

      if (state.lastLoadedUrl === raw) {
        if (!state.duplicateSeenAt) state.duplicateSeenAt = performance.now();
        const elapsed = performance.now() - state.duplicateSeenAt;
        if (elapsed >= 2000) {
          els.reloadCta.classList.add('show');
        }
        return false;
      }

      loadUrl(raw, false);
      return true;
    }

    async function scanLoop() {
      if (state.decoding) {
        state.scanLoopId = requestAnimationFrame(scanLoop);
        return;
      }

      const vw = els.video.videoWidth;
      const vh = els.video.videoHeight;
      if (!vw || !vh) {
        state.scanLoopId = requestAnimationFrame(scanLoop);
        return;
      }

      state.decoding = true;
      try {
        const canvas = els.scanCanvas;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const cropW = Math.floor(vw / state.zoom);
        const cropH = Math.floor(vh / state.zoom);
        const sx = Math.floor((vw - cropW) / 2);
        const sy = Math.floor((vh - cropH) / 2);
        canvas.width = cropW;
        canvas.height = cropH;
        ctx.drawImage(els.video, sx, sy, cropW, cropH, 0, 0, cropW, cropH);

        let raw = '';
        let points = null;
        if (state.detectorMode === 'native' && state.detector) {
          const box = await state.detector.detect(canvas);
          if (box.length) {
            raw = box[0].rawValue || '';
            if (box[0].cornerPoints && box[0].cornerPoints.length === 4) {
              points = box[0].cornerPoints;
            }
          }
        } else if (state.detectorMode === 'jsqr' && typeof window.jsQR === 'function') {
          const imageData = ctx.getImageData(0, 0, cropW, cropH);
          const result = window.jsQR(imageData.data, cropW, cropH, {
            inversionAttempts: 'attemptBoth'
          });
          if (result && result.data) {
            raw = result.data;
            if (result.location) {
              const mapX = p => sx + p.x;
              const mapY = p => sy + p.y;
              points = [
                { x: mapX(result.location.topLeftCorner), y: mapY(result.location.topLeftCorner) },
                { x: mapX(result.location.topRightCorner), y: mapY(result.location.topRightCorner) },
                { x: mapX(result.location.bottomRightCorner), y: mapY(result.location.bottomRightCorner) },
                { x: mapX(result.location.bottomLeftCorner), y: mapY(result.location.bottomLeftCorner) }
              ];
            }
          }
        }

        if (raw) {
          state.lastDetectedData = raw;
          const didStartLoad = handleQrText(raw);
          if (didStartLoad && points) drawFeedbackPolygon(points);
        } else {
          state.duplicateSeenAt = null;
          if (!state.scannedOnce) {
            els.startOverlay.style.display = 'grid';
          }
        }
      } catch (_) {
        // Ignore intermittent decode issues.
      } finally {
        renderFeedback();
        state.decoding = false;
        state.scanLoopId = requestAnimationFrame(scanLoop);
      }
    }

    async function init() {
      await loadI18n();
      setZoom(1);

      els.zoomIn.addEventListener('click', () => setZoom(state.zoom + state.zoomStep));
      els.zoomOut.addEventListener('click', () => setZoom(state.zoom - state.zoomStep));
      els.cameraBtn.addEventListener('click', switchCamera);
      window.addEventListener('pointerdown', unlockAudio, { once: true });
      window.addEventListener('touchstart', unlockAudio, { once: true });
      els.reloadBtn.addEventListener('click', () => {
        if (state.lastLoadedUrl) loadUrl(state.lastLoadedUrl, true);
      });

      try {
        await ensureDetector();
      } catch (_) {
        showError(state.strings.no_qr_support);
        return;
      }

      try {
        await startStream();
      } catch (_) {
        showError(state.strings.camera_error);
        return;
      }

      if (state.scanLoopId) cancelAnimationFrame(state.scanLoopId);
      state.scanLoopId = requestAnimationFrame(scanLoop);
    }

    window.addEventListener('beforeunload', stopStream);
    window.addEventListener('pagehide', stopStream);

    init();
  </script>
</body>
</html>
